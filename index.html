<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<title>咔滋餐車POS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f2f5;--panel:#ffffff;--panel2:#f8f9fa;
  --acc:#e67e22;--acc2:#d35400;--grn:#27ae60;--red:#e74c3c;
  --blu:#2980b9;--pur:#8e44ad;--dark:#2c3e50;
  --t1:#2c3e50;--t2:#5d6d7e;--t3:#95a5a6;
  --bd:#dde1e7;--bd2:#c8cfd8;
  --r:10px;--rs:7px;
}
html,body{height:100dvh;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Noto Sans TC',sans-serif;font-size:14px}
button{cursor:pointer;font-family:'Noto Sans TC',sans-serif;border:none}
input,textarea,select{font-family:'Noto Sans TC',sans-serif;outline:none;color:var(--t1)}

/* ══ LOGIN ══ */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#2c3e50 0%,#34495e 50%,#2c3e50 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
.login-logo{font-size:26px;font-weight:700;color:var(--acc);margin-bottom:4px;letter-spacing:1px}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.login-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;text-align:left}
.login-field label{font-size:12px;font-weight:700;color:var(--t2)}
.login-field input{padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;background:var(--panel2);transition:.2s}
.login-field input:focus{border-color:var(--acc);background:#fff}
.login-btn{width:100%;padding:13px;background:var(--acc);color:#fff;border-radius:8px;font-size:16px;font-weight:700;margin-top:6px;transition:.15s;box-shadow:0 4px 14px rgba(230,126,34,.35)}
.login-btn:active{background:var(--acc2);transform:scale(.98)}
.login-err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}

/* ══ NAV ══ */
#app{display:none;height:100dvh;flex-direction:column}
#app.ready{display:flex}
#nav{display:flex;align-items:center;background:var(--dark);height:52px;padding:0 12px;gap:6px;flex-shrink:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.3);padding-top:env(safe-area-inset-top)}
.logo{font-size:16px;font-weight:700;color:#f39c12;margin-right:10px;white-space:nowrap;cursor:pointer}
.nb{padding:8px 14px;border-radius:20px;background:transparent;color:#bdc3c7;font-size:13px;font-weight:500;transition:.15s;border:1px solid transparent}
.nb:hover{background:rgba(255,255,255,.1);color:#fff}
.nb.active{background:var(--acc);color:#fff;font-weight:700}
#nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
#nav-date{font-size:12px;color:#7f8c8d;white-space:nowrap}
.bt-status{font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(231,76,60,.2);color:#e74c3c;cursor:pointer;border:1px solid rgba(231,76,60,.3);white-space:nowrap;transition:.2s}
.bt-status.on{background:rgba(39,174,96,.2);color:#27ae60;border-color:rgba(39,174,96,.3)}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:12px;background:rgba(255,255,255,.1);color:#bdc3c7;border:1px solid rgba(255,255,255,.15);cursor:pointer}
.logout-btn:hover{background:rgba(231,76,60,.3);color:#e74c3c}

/* ══ PAGES ══ */
.pg{display:none;flex:1;overflow:hidden}
.pg.active{display:flex}
#pg-order{flex-direction:row}
#pg-om,#pg-pre{flex-direction:row}
#pg-mgmt,#pg-rpt{flex-direction:column;padding:10px;gap:8px;overflow-y:auto}

/* ══ ORDER PAGE ══ */
.op-left{width:310px;min-width:240px;background:var(--panel);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.op-right{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.panel-hd{padding:10px 14px 6px;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-hd .hint{font-size:11px;color:var(--acc);font-weight:500;text-transform:none;letter-spacing:0}

.prod-list{overflow-y:auto;flex:1;padding:4px 8px 8px}
.pi{display:flex;align-items:center;padding:11px 12px;border-radius:var(--rs);margin-bottom:4px;cursor:pointer;border:1.5px solid var(--bd);background:var(--panel);transition:.12s;gap:8px}
.pi:active{transform:scale(.97)}
.pi:hover{background:#fef9f0;border-color:var(--acc)}
.pi.so{opacity:.35;cursor:not-allowed;background:#f8f8f8}
.pi-left{flex:1;min-width:0}
.pi-name{font-size:14px;font-weight:500;color:var(--t1)}
.pi-stock{font-size:11px;color:var(--t3);margin-top:2px}
.pi-price{font-size:16px;font-weight:700;color:var(--acc);white-space:nowrap}

.co-top{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:6px 12px 4px}
.seq-display{display:flex;align-items:center;gap:10px;background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--rs);padding:6px 12px;margin-bottom:6px;flex-shrink:0}
.seq-label{font-size:12px;color:var(--t3);font-weight:700;white-space:nowrap}
.seq-value{font-size:20px;font-weight:700;color:var(--acc)}

.cart-scroll{flex:1;overflow-y:auto;min-height:0;background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--rs);padding:6px 8px;margin-bottom:6px}
.cart-empty{padding:20px;text-align:center;color:var(--t3);font-size:13px}
.ci{display:flex;align-items:center;gap:8px;padding:7px 4px;border-bottom:1px solid var(--bd)}
.ci:last-child{border-bottom:none}
.ci-name{flex:1;font-size:14px;font-weight:500}
.qc{display:flex;align-items:center;gap:6px}
.qb{width:30px;height:30px;border-radius:6px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.1s;font-weight:700}
.qb-m{background:#fde8e8;color:var(--red);border:1px solid #f5c6c6}
.qb-m:active{background:var(--red);color:#fff}
.qb-p{background:#e8f5e9;color:var(--grn);border:1px solid #c8e6c9}
.qb-p:active{background:var(--grn);color:#fff}
.qn{font-size:15px;font-weight:700;min-width:26px;text-align:center;color:var(--t1)}
.ci-sub{font-size:14px;font-weight:700;color:var(--acc);min-width:56px;text-align:right}

.meta-area{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-bottom:4px;flex-wrap:wrap}
.meta-field{display:flex;align-items:center}
.meta-field label{font-size:12px;font-weight:700;color:var(--t2);white-space:nowrap;margin-right:6px;flex-shrink:0}
.meta-inp{flex:1;padding:6px 8px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--panel);font-size:13px;resize:none}
.meta-inp:focus{border-color:var(--acc)}

.co-bottom{flex-shrink:0;padding:0 12px 6px;display:flex;flex-direction:column;gap:4px}
.total-line{display:flex;justify-content:space-between;align-items:center;padding:5px 12px;background:var(--panel);border-radius:var(--rs);border:1.5px solid var(--bd)}
.total-lbl{font-size:14px;font-weight:700;color:var(--t2)}
.total-val{font-size:22px;font-weight:700;color:var(--acc)}
.act-row{display:flex;gap:8px}
.co-btn{flex:2;padding:11px;background:var(--grn);color:#fff;border-radius:var(--r);font-size:15px;font-weight:700;transition:.12s;box-shadow:0 2px 6px rgba(39,174,96,.3)}
.co-btn:active{background:#219a52;transform:scale(.98)}
.hold-btn{flex:1;padding:11px;background:var(--acc);color:#fff;border-radius:var(--r);font-size:14px;font-weight:700;box-shadow:0 2px 6px rgba(230,126,34,.3)}
.hold-btn:active{background:var(--acc2)}
.edit-badge{display:none;font-size:11px;color:#fff;margin-left:8px;padding:2px 8px;background:var(--blu);border-radius:10px;font-weight:normal;vertical-align:middle}

.numpad-area{flex-shrink:0;padding:0 12px 6px}
.pay-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.pay-box{background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--rs);padding:4px 10px;display:flex;align-items:center;justify-content:space-between}
.pay-box label{font-size:12px;color:var(--t3);font-weight:700;white-space:nowrap}
.pay-box .pv{font-size:18px;font-weight:700;color:var(--t1);text-align:right}
.pay-box .pv.pos{color:var(--grn)}.pay-box .pv.neg{color:var(--red)}
.npg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.npb{padding:8px 4px;border-radius:var(--rs);background:var(--panel);color:var(--t1);font-size:15px;font-weight:600;text-align:center;transition:.1s;border:1.5px solid var(--bd);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.npb:active{background:var(--dark);color:#fff;transform:scale(.94)}
.npb-clr{background:#fde8e8;color:var(--red);border-color:#f5c6c6}
.npb-clr:active{background:var(--red);color:#fff}
.npb-bk{background:#f0f0f0;color:var(--t2)}

/* ══ ORDER MGMT PAGE ══ */
.om-left{width:55%;background:var(--panel);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.om-right{flex:1;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;padding:10px;gap:8px}
.om-sec{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:8px 10px}
.sort-bar{display:flex;gap:5px;flex-shrink:0;margin-bottom:8px;flex-wrap:wrap}
.sb{padding:6px 12px;border-radius:16px;background:var(--panel2);color:var(--t2);font-size:12px;font-weight:500;border:1.5px solid var(--bd);transition:.15s}
.sb:hover{border-color:var(--acc);color:var(--acc)}
.sb.active{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}

.wc{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border:1.5px solid var(--bd);border-radius:var(--rs);background:var(--panel);margin-bottom:5px;transition:.2s}
.wc.overdue{border-color:var(--red)!important;animation:redpulse 1.2s ease-in-out infinite}
@keyframes redpulse{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.4)}50%{box-shadow:0 0 0 6px rgba(231,76,60,.1)}}
.wc-no{font-weight:700;color:var(--acc);font-size:17px;min-width:48px;line-height:1.3;flex-shrink:0}
.wc-body{flex:1;min-width:0}
.wc-sum{font-size:13px;color:var(--t1);line-height:1.5;word-break:break-all;font-weight:500}
.wc-meta{font-size:15px;color:var(--acc);font-weight:700;margin-top:3px;line-height:1.4}
.wc-amt{font-size:14px;font-weight:700;color:var(--acc);margin-top:4px}
.wc-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.btn-serve{padding:8px 14px;border-radius:6px;background:var(--grn);color:#fff;font-size:13px;font-weight:700;white-space:nowrap}
.btn-serve:active{background:#219a52}
.btn-edit2{padding:8px 14px;border-radius:6px;background:var(--blu);color:#fff;font-size:13px;font-weight:700;white-space:nowrap}
.btn-edit2:active{opacity:.8}
.done-list{flex:1;overflow-y:auto;min-height:0;background:var(--panel);border-radius:var(--rs);border:1.5px solid var(--bd)}
.dc{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-bottom:1px solid var(--bd)}
.dc:last-child{border-bottom:none}
.dc-no{font-weight:700;color:var(--grn);font-size:15px;min-width:48px;flex-shrink:0}
.dc-body{flex:1;min-width:0}
.dc-sum{font-size:13px;color:var(--t1);line-height:1.5;word-break:break-all}
.dc-meta{font-size:15px;color:var(--acc);font-weight:700;margin-top:2px}
.dc-amt{font-weight:700;color:var(--t1);min-width:52px;text-align:right;font-size:14px}
.dc-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0;margin-left:6px}
.btn-unserve{padding:5px 10px;border-radius:5px;background:#fef3e2;color:var(--acc);border:1.5px solid var(--acc);font-size:11px;font-weight:700;white-space:nowrap}
.btn-unserve:active{background:var(--acc);color:#fff}
.btn-reprint{padding:5px 10px;border-radius:5px;background:#e8f4fd;color:var(--blu);border:1.5px solid var(--blu);font-size:11px;font-weight:700;white-space:nowrap}
.btn-reprint:active{background:var(--blu);color:#fff}
.bdg{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-right:4px;flex-shrink:0}
.bdg-done{background:#e8f5e9;color:var(--grn)}
.bdg-pend{background:#fef3e2;color:var(--acc)}

/* ══ PRE-ORDER PAGE ══ */
.pre-left{flex:1;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;padding:8px 10px}
.hc{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border:1.5px solid #c39bd3;border-radius:var(--rs);background:#fdf2ff;margin-bottom:5px;transition:.2s}
.hc.hc-alert{border-color:var(--red)!important;background:#fff5f5;animation:redpulse 1.2s ease-in-out infinite}
.hc-no{font-weight:700;color:var(--pur);font-size:17px;min-width:48px;line-height:1.3;flex-shrink:0}
.hc-body{flex:1;min-width:0}
.hc-sum{font-size:13px;color:var(--t1);line-height:1.5;word-break:break-all;font-weight:500}
.hc-meta{font-size:15px;color:var(--acc);font-weight:700;margin-top:3px;line-height:1.4}
.hc-pickup{color:var(--acc2);font-weight:700}
.hc-amt{font-size:14px;font-weight:700;color:var(--acc);margin-top:4px}
.btn-prep{padding:10px 14px;border-radius:6px;background:var(--acc);color:#fff;font-size:13px;font-weight:700;white-space:nowrap;align-self:center;flex-shrink:0}
.btn-prep:active{background:var(--acc2)}

/* ══ MGMT PAGE ══ */
.mg-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;flex:1;min-height:0}
.mg-right-stack{display:flex;flex-direction:column;gap:10px}
.card{background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--r);padding:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-ttl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;flex-shrink:0}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.fg label{font-size:11px;color:var(--t2);font-weight:700}
.fg input,.fg textarea,.fg select{padding:9px 11px;border:1.5px solid var(--bd);border-radius:6px;background:var(--panel2);font-size:14px;transition:.12s}
.fg input:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{resize:vertical;min-height:60px}
.btn-pri{padding:9px 18px;background:var(--acc);color:#fff;border-radius:6px;font-size:13px;font-weight:700}
.btn-sec{padding:9px 13px;background:var(--panel2);color:var(--t2);border:1.5px solid var(--bd);border-radius:6px;font-size:13px}
.pm-scroll{overflow-y:auto;flex:1}
.pm-row{display:flex;align-items:center;gap:6px;padding:9px 2px;border-bottom:1px solid var(--bd)}
.pm-row .pm-name{flex:1;font-size:14px;font-weight:500}
.pm-row .pm-price{color:var(--acc);min-width:52px;font-size:13px;font-weight:700}
.pm-row .pm-stock{font-size:11px;color:var(--t3);min-width:60px}
.btn-ed{padding:5px 10px;border:1.5px solid var(--bd);border-radius:4px;color:var(--t2);background:var(--panel2);font-size:11px}
.btn-dl{padding:5px 10px;border:1.5px solid #f5c6c6;border-radius:4px;color:var(--red);background:#fde8e8;font-size:11px}

/* User management */
.user-row{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--bd)}
.user-row .u-name{flex:1;font-size:14px;font-weight:600;color:var(--t1)}
.user-row .u-role{font-size:11px;padding:2px 8px;border-radius:10px;background:#e8f4fd;color:var(--blu);font-weight:700}
.user-row .u-role.admin{background:#fef3e2;color:var(--acc)}

/* ══ REPORT PAGE ══ */
.rpt-topbar{display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.rpt-topbar label{font-size:12px;color:var(--t2);font-weight:700}
select{padding:8px 12px;border:1.5px solid var(--bd);border-radius:6px;background:var(--panel);color:var(--t1);cursor:pointer;font-size:13px}
.store-btns{display:flex;gap:8px;margin-left:auto}
.btn-open{padding:9px 20px;background:var(--grn);color:#fff;border-radius:6px;font-size:14px;font-weight:700}
.btn-open:active{background:#219a52}
.btn-close{padding:9px 20px;background:var(--red);color:#fff;border-radius:6px;font-size:14px;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;flex-shrink:0}
.sc{background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center}
#rpt-cust-wrap table{min-width:900px}  /* 客戶表格較寬，允許橫向滾動 */
.sc{background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px;text-align:center}
.sv{font-size:26px;font-weight:700;color:var(--acc)}
.sl{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500}
.rpt-tables{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1;min-height:0}
.rpt-tbl-wrap{background:var(--panel);border:1.5px solid var(--bd);border-radius:var(--r);overflow-y:auto}
.tbl-ttl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;padding:10px 12px 6px;border-bottom:1px solid var(--bd);background:var(--panel2)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:7px 12px;background:var(--panel2);font-size:11px;font-weight:700;color:var(--t3);position:sticky;top:0;border-bottom:1px solid var(--bd)}
td{padding:7px 12px;border-bottom:1px solid var(--bd);font-size:13px}

/* ══ RECEIPT MODAL ══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:#fff;border-radius:var(--r);padding:20px;width:100%;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.mbox h2{font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:1px;color:var(--dark)}
.r-no-big{font-size:64px;font-weight:700;color:var(--acc);line-height:1;margin:8px 0}
.r-sub{font-size:11px;color:var(--t3);margin-bottom:10px}
.r-items{text-align:left;font-size:13px;margin-bottom:8px}
.ri{display:flex;gap:4px;padding:4px 0;border-bottom:1px solid var(--bd)}
.ri .rn{flex:1}.ri .rq{color:var(--t2);min-width:28px;text-align:center}
.ri .rs{font-weight:700;color:var(--acc);min-width:52px;text-align:right}
.r-total{display:flex;justify-content:space-between;padding:8px 0 3px;font-weight:700;font-size:16px;border-top:1.5px solid var(--bd)}
.r-paid{font-size:12px;color:var(--t2);margin-top:3px}
.r-change{font-size:15px;font-weight:700;color:var(--grn);margin-top:2px}
.r-note{font-size:12px;color:var(--pur);margin-top:4px}
.mbtns{display:flex;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.mbtns button{padding:10px 16px;border-radius:6px;font-size:13px;font-weight:700}
.btn-btp{background:var(--blu);color:#fff}
.btn-close2{background:var(--panel2);color:var(--t2);border:1.5px solid var(--bd)}
.print-progress{font-size:12px;color:var(--t3);margin-top:8px;min-height:18px}

/* ══ ALERT MODAL ══ */
.alert-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.alert-box{background:#fff;border:3px solid var(--red);border-radius:var(--r);padding:22px;max-width:440px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.alert-box h2{color:var(--red);font-size:18px;margin-bottom:6px;text-align:center}
.alert-time{font-size:28px;font-weight:700;color:var(--acc);text-align:center;margin:4px 0 12px}

<script>
'use strict';

// ══════════════════════════════════════════════
// CONFIG — 請修改以下兩個設定
// ══════════════════════════════════════════════
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbytTr5a9YyFDs1q42kUrZ1eQSBO4mdsaiOVtVfMyEufTy0ysQTmZbuQR1HWOcrgHYsa/exec';
const API_TOKEN = '123456';  // 與 Code.gs 相同

// ══════════════════════════════════════════════
// LOGIN SYSTEM
// ══════════════════════════════════════════════
let currentUser = null; // { username, role }

function doLogin() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.textContent = '';
  if (!u || !p) { err.textContent = '請輸入帳號與密碼'; return; }

  // 取得用戶清單：優先用 S.users（已從 GAS 載入），否則用 localStorage 快取，最後用預設值
  const users = getUsers();
  const found = users.find(x => x.username.toLowerCase() === u);
  if (!found || found.password !== p) {
    err.textContent = '帳號或密碼錯誤';
    document.getElementById('login-pass').value = '';
    return;
  }
  currentUser = { username: found.username, role: found.role };
  // ★ 改用 localStorage 保存 session，重新整理後可還原
  localStorage.setItem('kazpos_session', JSON.stringify(currentUser));
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('ready');
  document.getElementById('user-label').textContent = found.username + ' 登出';
  document.getElementById('user-mgmt-card').style.display = found.role === 'admin' ? '' : 'none';
  initApp();
}

function doLogout() {
  localStorage.removeItem('kazpos_session');
  currentUser = null;
  document.getElementById('app').classList.remove('ready');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
}

function getUsers() {
  // Users stored in S.users; fallback default
  if (S && S.users && S.users.length) return S.users;
  return [{ username: 'superboss', password: '123456', role: 'admin' }];
}

function changeMyPw() {
  const old = document.getElementById('pw-old').value;
  const nw  = document.getElementById('pw-new').value;
  const cf  = document.getElementById('pw-confirm').value;
  const users = getUsers();
  const me = users.find(x => x.username === currentUser.username);
  if (!me || me.password !== old) { toast('目前密碼不正確'); return; }
  if (nw.length < 4) { toast('新密碼至少4個字元'); return; }
  if (nw !== cf) { toast('兩次輸入密碼不一致'); return; }
  me.password = nw;
  S.users = users;
  sv();
  ['pw-old','pw-new','pw-confirm'].forEach(id => document.getElementById(id).value = '');
  toast('密碼已更新 ✓');
}

function renderUsers() {
  const el = document.getElementById('user-list');
  const users = getUsers();
  el.innerHTML = '';
  users.forEach(u => {
    const d = document.createElement('div');
    d.className = 'user-row';
    const isSelf = u.username === currentUser.username;
    d.innerHTML = `<span class="u-name">${u.username}</span>`
      + `<span class="u-role ${u.role==='admin'?'admin':''}">${u.role==='admin'?'管理員':'員工'}</span>`;
    if (!isSelf) {
      const db = document.createElement('button');
      db.className = 'btn-dl'; db.textContent = '刪除';
      db.style.cssText = 'padding:4px 10px;font-size:11px;margin-left:6px;';
      db.onclick = () => delUser(u.username);
      d.appendChild(db);
    }
    el.appendChild(d);
  });
}

function addUser() {
  const name = document.getElementById('nu-name').value.trim();
  const pass = document.getElementById('nu-pass').value;
  const role = document.getElementById('nu-role').value;
  if (!name) { toast('請輸入帳號'); return; }
  if (pass.length < 4) { toast('密碼至少4個字元'); return; }
  const users = getUsers();
  if (users.find(u => u.username.toLowerCase() === name.toLowerCase())) { toast('帳號已存在'); return; }
  users.push({ username: name, password: pass, role });
  S.users = users;
  sv();
  ['nu-name','nu-pass'].forEach(id => document.getElementById(id).value = '');
  renderUsers();
  toast('帳號已新增：' + name);
}

function delUser(name) {
  const users = getUsers().filter(u => u.username !== name);
  S.users = users;
  sv(); renderUsers();
  toast('帳號已刪除：' + name);
}

// ══════════════════════════════════════════════
// GAS STORAGE LAYER
// ══════════════════════════════════════════════
// ★ TODAY 統一用 zh-TW Intl 格式化確保本地時區正確
const _now = new Date();
const TODAY = _now.getFullYear() + '-' +
  String(_now.getMonth()+1).padStart(2,'0') + '-' +
  String(_now.getDate()).padStart(2,'0');
document.getElementById('nav-date').textContent = '營業日：' + TODAY;

let _saveTimer = null, _gasReady = false;

function ld() {
  try { return JSON.parse(localStorage.getItem('kazpos_cache') || '{}'); } catch(e) { return {}; }
}
function sv() {
  try { localStorage.setItem('kazpos_cache', JSON.stringify(S)); } catch(e) {}
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_saveToSheets, 500);
}
function _saveToSheets() {
  if (!_gasReady) return;
  updateSyncStatus('saving');
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'saveAll', token: API_TOKEN, data: S })
  }).then(r => r.json()).then(() => updateSyncStatus('ok'))
    .catch(() => updateSyncStatus('error'));
}
function _loadFromSheets() {
  updateSyncStatus('saving');
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'loadAll', token: API_TOKEN })
  }).then(r => r.json()).then(res => {
    const data = res.data || res;
    if (data && data.products) {
      S = data;
      if (!S.seq)       S.seq = {};
      if (!S.holds)     S.holds = [];
      if (!S.orders)    S.orders = [];
      if (!S.sessions)  S.sessions = [];
      if (!S.users)     S.users = [{ username:'superboss', password:'123456', role:'admin' }];
      if (!S.config)    S.config = {};
      if (!S.customers) S.customers = [];
      if (S.curSession === undefined) S.curSession = null;

      // ★ 修正所有 date 欄位：若為長格式（含時間），截取前10字元
      const fixDate = d => {
        if (!d) return '';
        const s = String(d).trim();
        // 已是 yyyy-MM-dd 格式直接回傳
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // 嘗試解析並重新格式化
        const dt = new Date(s);
        if (!isNaN(dt.getTime())) {
          return dt.getFullYear() + '-' +
            String(dt.getMonth()+1).padStart(2,'0') + '-' +
            String(dt.getDate()).padStart(2,'0');
        }
        return s.slice(0, 10);
      };

      S.orders.forEach(o => { o.date = fixDate(o.date); o.ts = Number(o.ts)||0; });
      S.holds.forEach(h  => { h.date = fixDate(h.date);  h.ts = Number(h.ts)||0; });
      S.sessions.forEach(s => {
        s.date = fixDate(s.date);
        // ★ closeTime 空字串視為 null
        if (!s.closeTime || s.closeTime.trim() === '') s.closeTime = null;
      });
      S.customers.forEach(c => {
        c.date = fixDate(c.date);
        c.ts   = Number(c.ts)||0;
      });

      // ★ 重新計算 curSession（以防 GAS 算的不準）
      const openSess = S.sessions.filter(s => s.date === TODAY && !s.closeTime);
      if (openSess.length > 0) {
        S.curSession = openSess[openSess.length - 1];
      } else {
        S.curSession = null;
      }

      try { localStorage.setItem('kazpos_cache', JSON.stringify(S)); } catch(e) {}
    }
    _gasReady = true;
    updateSyncStatus('ok');
    applyConfig();
    renderProds(); renderCart(); renderWait(); renderHoldList(); renderOM();
    updateStoreBtn(); updBt(); buildNP();
    if (currentUser) renderUsers();
  }).catch(() => {
    _gasReady = true;
    updateSyncStatus('error');
    toast('無法從雲端載入，使用本機快取資料', 4000);
  });
}

// ── 定時輪詢：每 30 秒從 GAS 拉取最新預訂單和客戶資料 ──
function _pollHolds(){
  if (!_gasReady || !currentUser) return;
  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify({ action: 'loadAll', token: API_TOKEN })
  }).then(r => r.json()).then(res => {
    const data = res.data || res;
    if (!data) return;
    // 找出本機沒有的新 hold
    const prevIds = new Set(S.holds.map(h => h.id));
    const newHolds = (data.holds || []).filter(h => !prevIds.has(h.id));
    if (newHolds.length > 0) {
      S.holds = [...S.holds, ...newHolds];
      const pre = newHolds.filter(h => h.sessionId === 'PREORDER');
      if (pre.length > 0) {
        toast('📩 新客人預訂 '+pre.length+' 筆！', 4000);
        renderHoldList();
        // 如果正在預訂單頁面，重新整理
        if (document.getElementById('pg-pre').classList.contains('active')) renderHoldList();
      }
      try { localStorage.setItem('kazpos_cache', JSON.stringify(S)); } catch(e) {}
    }
    // 更新 customers（報表頁面用）
    if (data.customers) S.customers = data.customers;
  }).catch(()=>{});
}

function doCheckout(){
  if (!S.curSession||S.curSession.closeTime){toast('請先開店才能結帳');return;}
  const keys=Object.keys(cart).filter(k=>cart[k]>0);
  if (!keys.length){toast('請先加入商品');return;}
  const tot=cartTot();
  if (payAmt>0&&payAmt<tot){toast('付款金額不足');return;}
  const note   = document.getElementById('note-inp').value.trim();
  const pickup = document.getElementById('pickup-inp').value;
  const phone  = document.getElementById('phone-inp').value.replace(/\D/g,'').slice(-3);
  const items  = keys.map(pid=>{const p=S.products.find(x=>x.id===pid);return{pid,name:p.name,price:p.price,qty:cart[pid],sub:p.price*cart[pid]};});
  const chg    = payAmt>0 ? payAmt-tot : 0;

  // 編輯模式
  if (!editOrderId&&window._editOrderIdBackup) editOrderId=window._editOrderIdBackup;
  window._editOrderIdBackup=null;

  if (editOrderId){
    const old=S.orders.find(o=>o.id===editOrderId);
    if (old){
      old.items.forEach(i=>{const p=S.products.find(x=>x.id===i.pid);if(p&&p.sold&&p.sold[TODAY])p.sold[TODAY]=Math.max(0,p.sold[TODAY]-i.qty);});
      old.items=items;old.total=tot;old.paid=payAmt;old.change=chg;old.note=note;old.pickup=pickup;old.phone=phone;old.status='pending';
      items.forEach(i=>{const p=S.products.find(x=>x.id===i.pid);if(!p.sold)p.sold={};if(!p.sold[TODAY])p.sold[TODAY]=0;p.sold[TODAY]+=i.qty;});
      sv(); lastOrder=Object.assign({},old);
    }
    editOrderId=null; window._editOrderIdBackup=null;
    document.getElementById('edit-badge').style.display='none';
    document.getElementById('co-btn').textContent='結帳 ';
    document.getElementById('co-btn').appendChild(document.getElementById('edit-badge'));
    document.getElementById('order-seq-display').textContent='尚未結帳';
  } else {
    // ── 每次結帳都取正式流水號（含從暫存/預訂單來的）──
    const seq=nextSeq();
    const no=orderNo(seq);
    const order={id:'o'+Date.now(),no,seq,date:TODAY,sessionId:curSessId(),items,total:tot,paid:payAmt,change:chg,note,pickup,phone,status:'pending',ts:Date.now()};
    S.orders.push(order);
    items.forEach(i=>{const p=S.products.find(x=>x.id===i.pid);if(!p.sold)p.sold={};if(!p.sold[TODAY])p.sold[TODAY]=0;p.sold[TODAY]+=i.qty;});
    sv(); lastOrder=order;
    window._fromHoldId=null; window._isPreorder=null;
  }
  clearCO(); showRcpt(lastOrder);
  if (btConnected) setTimeout(()=>btPrint(), 400);
}

  if (editOrderId){toast('編輯模式中請按結帳');return;}
  const keys=Object.keys(cart).filter(k=>cart[k]>0);
  if (!keys.length){toast('請先加入商品');return;}
  // 暫存單不佔用正式流水號，以 HOLD+時間戳 作為暫存識別

  S.holds.push({id:tmpId,no:tmpNo,seq:0,date:TODAY,sessionId:curSessId(),items,total:cartTot(),note,pickup,phone,ts:Date.now(),alertFired:false,isHold:true});

function setWaitSort(btn,key){ waitSortKey=key; document.querySelectorAll('#wait-sort .sb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderWait(); }
function setPreSort(btn,key){ preSortKey=key; document.querySelectorAll('#pre-sort .sb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderHoldList(); }
function applySort(arr,key){
  const a=[...arr];
  if(key==='seq')     return a.sort((x,y)=>x.seq-y.seq);
  if(key==='seq-d')   return a.sort((x,y)=>y.seq-x.seq);
  if(key==='time')    return a.sort((x,y)=>x.ts-y.ts);
  if(key==='time-d')  return a.sort((x,y)=>y.ts-x.ts);
  if(key==='amt')     return a.sort((x,y)=>y.total-x.total);
  if(key==='pickup')  return a.sort((x,y)=>{if(!x.pickup&&!y.pickup)return 0;if(!x.pickup)return 1;if(!y.pickup)return -1;return x.pickup.localeCompare(y.pickup);});
  if(key==='phone')   return a.sort((x,y)=>(x.phone||'').localeCompare(y.phone||''));
  if(key==='note')    return a.sort((x,y)=>(x.note||'').localeCompare(y.note||'','zh-Hant'));
  return a;
}

function renderHoldList(){
  const el=document.getElementById('hold-list');
  const holds=applySort(todayH(),preSortKey);
  if (!holds.length){el.innerHTML='<div class="empty">無預訂單</div>';return;}
  el.innerHTML='';
  holds.forEach(h=>{
    const d=document.createElement('div'); d.className='hc'+(h.alertFired?' hc-alert':'');
    const sum=h.items.map(i=>i.name+' x'+i.qty).join('・');
    const no=document.createElement('div');no.className='hc-no';no.textContent=h.no;
    const body=document.createElement('div');body.className='hc-body';
    body.innerHTML='<div class="hc-sum">'+sum+'</div>'
      +(h.note?'<div class="hc-meta">備：'+h.note+'</div>':'')
      +(h.phone?'<div class="hc-meta">📱 '+h.phone+'</div>':'')
      +(h.pickup?'<div class="hc-meta hc-pickup">取餐：'+h.pickup+'</div>':'')
      +'<div class="hc-amt">'+fmt(h.total)+'</div>';
    const pb=document.createElement('button');pb.className='btn-prep';pb.textContent='備餐結帳';pb.onclick=()=>checkoutHold(h.id);
    d.appendChild(no);d.appendChild(body);d.appendChild(pb);el.appendChild(d);
  });
}
function checkoutHold(id){
  const h=S.holds.find(x=>x.id===id);if(!h)return;
  cart={}; h.items.forEach(i=>{cart[i.pid]=i.qty;});
  document.getElementById('note-inp').value=h.note||'';
  document.getElementById('pickup-inp').value=h.pickup||'';
  document.getElementById('phone-inp').value=h.phone||'';
  // 記錄來源 hold，結帳時取正式流水號
  window._fromHoldId=h.id;
  window._isPreorder=(h.sessionId==='PREORDER');
  S.holds=S.holds.filter(x=>x.id!==id); sv();
  const label=h.sessionId==='PREORDER'?'預訂單 '+h.no:'暫存單';
  document.getElementById('order-seq-display').textContent=label+' → 按結帳取得正式單號';
  showPg('order'); renderCart(); toast('已載入'+label+'，確認後按結帳');
}

// ══════════════════════════════════════════════
// PICKUP ALERTS
// ══════════════════════════════════════════════
function checkPickupAlerts(){
  const now=new Date(), groups={};
  todayH().forEach(h=>{
    if (!h.pickup)return;
    const parts=h.pickup.split(':');
    const pt=new Date();pt.setHours(+parts[0],+parts[1],0,0);
    const diff=(pt-now)/60000;
    if (diff>0&&diff<=10){
      if (!groups[h.pickup])groups[h.pickup]=[];groups[h.pickup].push(h);
      if (!h.alertFired){h.alertFired=true;sv();}
    }
  });
  Object.entries(groups).forEach(([time,hs])=>{
    const key=time+'|'+hs.map(h=>h.id).sort().join(',');
    if (alertShown.has(key))return;
    alertShown.add(key);
    const modal=document.getElementById('alert-modal');
    if (modal.style.display==='flex'){
      const cur=document.getElementById('alert-time').textContent;
      if (!cur.includes(time)){
        document.getElementById('alert-time').textContent=cur+' / '+time;
        const div=document.createElement('div');div.style.cssText='border-top:1px solid #ddd;margin:8px 0;';
        document.getElementById('alert-orders').appendChild(div);
        hs.forEach(h=>document.getElementById('alert-orders').appendChild(buildAO(h)));
      }
    } else {showPickupAlert(time,hs);}
  });
  renderHoldList(); renderWait();
}
function buildAO(h){
  const div=document.createElement('div');div.className='ao';
  const sum=h.items.map(i=>i.name+' x'+i.qty).join('・');
  div.innerHTML='<div class="ao-no">'+h.no+'</div><div class="ao-sum">'+sum+'</div>'+(h.note?'<div class="ao-note">備：'+h.note+'</div>':'');
  return div;
}
function showPickupAlert(time,hs){
  document.getElementById('alert-time').textContent='取餐時間：'+time;
  const c=document.getElementById('alert-orders');c.innerHTML='';hs.forEach(h=>c.appendChild(buildAO(h)));
  document.getElementById('alert-modal').style.display='flex';
}
function closeAlert(){ document.getElementById('alert-modal').style.display='none'; }
setInterval(()=>{ if(currentUser)checkPickupAlerts(); }, 30000);

function saveProd(){
  const n=document.getElementById('f-name').value.trim();
  const pr=parseInt(document.getElementById('f-price').value)||0;
  const st=parseInt(document.getElementById('f-stock').value)||0;
  if (!n){toast('請輸入名稱');return;}if(!pr){toast('請輸入單價');return;}
  if (editPid){const p=S.products.find(x=>x.id===editPid);if(p){p.name=n;p.price=pr;p.stock=st;}cancelEdit();toast('商品已更新');}
  else{S.products.push({id:'p'+Date.now(),name:n,price:pr,stock:st,sold:{}});toast('商品已新增');}
  sv();['f-name','f-price','f-stock'].forEach(i=>document.getElementById(i).value='');renderPM();renderProds();
}
function editP(id){
  const p=S.products.find(x=>x.id===id);if(!p)return;editPid=id;
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-price').value=p.price;
  document.getElementById('f-stock').value=p.stock||0;
  document.getElementById('mgmt-ftitle').textContent='編輯商品';
  document.getElementById('mgmt-save').textContent='儲存';
  document.getElementById('mgmt-cancel').style.display='';
}
function cancelEdit(){
  editPid=null;['f-name','f-price','f-stock'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('mgmt-ftitle').textContent='新增商品';
  document.getElementById('mgmt-save').textContent='新增商品';
  document.getElementById('mgmt-cancel').style.display='none';
}
function delP(id){S.products=S.products.filter(x=>x.id!==id);sv();renderPM();renderProds();toast('已刪除');}

function buildDateSel(){
  const sel=document.getElementById('rpt-sel');
  // ★ 只收集符合 yyyy-MM-dd 格式的日期，過濾掉長格式字串
  const isValidDate = d => /^\d{4}-\d{2}-\d{2}$/.test(String(d||'').trim());
  const orderDates=S.orders.map(o=>o.date).filter(isValidDate);
  const custDates=(S.customers||[]).map(c=>c.date).filter(isValidDate);
  const dates=[...new Set([...orderDates,...custDates])].sort().reverse();
  if (!dates.includes(TODAY)) dates.unshift(TODAY);
  sel.innerHTML='';
  dates.forEach(d=>{
    const opt=document.createElement('option');
    opt.value=d;
    opt.textContent=d+(d===TODAY?' (今日)':'');
    sel.appendChild(opt);
  });
}
function renderRpt(){
  const date=document.getElementById('rpt-sel').value||TODAY;

  // ── 已結帳訂單統計 ──
  const orders=S.orders.filter(o=>o.date===date&&o.status!=='cancelled');
  const tot=orders.reduce((s,o)=>s+o.total,0), cnt=orders.length;
  // 預訂單（當日所有 PREORDER holds 的預估金額）
  const preHolds=S.holds.filter(h=>h.date===date&&h.sessionId==='PREORDER');
  document.getElementById('rpt-sg').innerHTML=
    '<div class="sc"><div class="sv">'+fmt(tot)+'</div><div class="sl">已結帳總額</div></div>'
    +'<div class="sc"><div class="sv">'+cnt+'</div><div class="sl">已結帳訂單</div></div>'
    +'<div class="sc"><div class="sv">'+preHolds.length+'</div><div class="sl">待處理預訂單</div></div>';

  // ── 商品銷售統計（已結帳） ──
  const map={};
  orders.forEach(o=>{
    // items 從 GAS 回來是陣列物件，確保正確讀取
    const items=Array.isArray(o.items)?o.items:[];
    items.forEach(i=>{
      const nm=i.name||'';const qty=Number(i.qty)||0;const sub=Number(i.sub)||0;
      if(!map[nm])map[nm]={q:0,a:0};map[nm].q+=qty;map[nm].a+=sub;
    });
  });
  const rows=Object.entries(map).sort((a,b)=>b[1].a-a[1].a);
  let phtml='<table><thead><tr><th>商品</th><th>數量</th><th>金額</th><th>佔比</th></tr></thead><tbody>';
  if (!rows.length)phtml+='<tr><td colspan="4" style="text-align:center;color:#999;padding:14px">無資料</td></tr>';
  rows.forEach(([n,v])=>{const pct=tot?Math.round(v.a/tot*100):0;phtml+='<tr><td>'+n+'</td><td>'+v.q+'份</td><td>'+fmt(v.a)+'</td><td>'+pct+'%</td></tr>';});
  phtml+='</tbody></table>';document.getElementById('rpt-prod').innerHTML=phtml;

  // ── 已結帳訂單列表 ──
  let ohtml='<table><thead><tr><th>單號</th><th>時間</th><th>內容</th><th>備註</th><th>手機</th><th>金額</th></tr></thead><tbody>';
  if (!orders.length)ohtml+='<tr><td colspan="6" style="text-align:center;color:#999;padding:14px">無已結帳訂單</td></tr>';
  orders.slice().sort((a,b)=>b.ts-a.ts).forEach(o=>{
    // ts 可能是數字或字串，統一轉數字
    const tsNum=Number(o.ts)||0;
    const d=tsNum?new Date(tsNum):new Date();
    const ts=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
    const items=Array.isArray(o.items)?o.items:[];
    const sum=items.map(i=>i.name+'x'+(i.qty||1)).join('・');
    // 確認 no 和 total 欄位正確
    const no=String(o.no||'—');
    const total=Number(o.total)||0;
    ohtml+='<tr><td style="font-weight:700;color:var(--acc)">'+no+'</td><td>'+ts+'</td><td>'+sum+'</td><td>'+(o.note||'')+'</td><td>'+(o.phone||'')+'</td><td style="font-weight:700">'+fmt(total)+'</td></tr>';
  });
  ohtml+='</tbody></table>';document.getElementById('rpt-orders').innerHTML=ohtml;

  // ── 預訂客戶資訊報表 ──
  const custs=(S.customers||[]).filter(c=>c.date===date);
  const custEl=document.getElementById('rpt-cust');
  const cntEl=document.getElementById('rpt-cust-count');
  if (!custs.length){
    custEl.innerHTML='<div style="text-align:center;color:#999;padding:14px;font-size:13px">此日期無預訂客戶資料</div>';
    cntEl.textContent='';
  } else {
    cntEl.textContent='共 '+custs.length+' 筆';
    const sc=[...custs].sort((a,b)=>Number(b.ts)-Number(a.ts));
    let chtml='<table><thead><tr>'
      +'<th>預訂單號</th><th>稱謂</th><th>電子郵件</th><th>手機末3碼</th>'
      +'<th>訂購日期</th><th>取餐時間</th><th>訂購內容</th><th>備註</th><th>金額</th>'
      +'</tr></thead><tbody>';
    sc.forEach(c=>{
      // items 防呆
      let items=c.items;
      if (typeof items==='string'){try{items=JSON.parse(items);}catch(e){items=[];}}
      if (!Array.isArray(items))items=[];
      const sum=items.map(i=>(i.name||'')+'x'+(i.qty||1)).join('・');
      const total=Number(c.total)||0;
      chtml+='<tr>'
        +'<td style="font-weight:700;color:var(--pur)">'+(c.preOrderNo||'—')+'</td>'
        +'<td>'+(c.name||'—')+'</td>'
        +'<td style="color:var(--blu)"><a href="mailto:'+(c.email||'')+'">'+( c.email||'—')+'</a></td>'
        +'<td>'+(c.phone||'—')+'</td>'
        +'<td>'+(c.date||'—')+'</td>'
        +'<td>'+(c.pickup||'—')+'</td>'
        +'<td style="max-width:180px;word-break:break-all">'+sum+'</td>'
        +'<td>'+(c.note||'—')+'</td>'
        +'<td style="font-weight:700;color:var(--acc)">'+fmt(total)+'</td>'
        +'</tr>';
    });
    chtml+='</tbody></table>';
    custEl.innerHTML=chtml;
  }
}

}

// BLUETOOTH
// ══════════════════════════════════════════════
const BT_SVCS=['000018f0-0000-1000-8000-00805f9b34fb','0000ff00-0000-1000-8000-00805f9b34fb','0000ffe0-0000-1000-8000-00805f9b34fb','49535343-fe7d-4ae5-8fa9-9fafd205e455','e7810a71-73ae-499d-8c15-faa9aef0c3f2'];
const BT_CHARS=['00002af1-0000-1000-8000-00805f9b34fb','0000ff02-0000-1000-8000-00805f9b34fb','0000ffe1-0000-1000-8000-00805f9b34fb','49535343-8841-43f4-a8d4-ecbe34729bb3','bef8d6c9-9c21-4c9e-b632-bd58c1009f9f'];
let btDevice=null, btChar=null, btConnected=false;

function updBt(){
  const el=document.getElementById('bt-status');
  if (btConnected){el.textContent='印表機：'+((btDevice&&btDevice.name)||'已連線');el.className='bt-status on';}
  else{el.textContent='印表機：未連線';el.className='bt-status';}
}
async function btConnect(){
  if (!navigator.bluetooth){toast('請使用 Chrome 瀏覽器');return;}
  if (btConnected){
    try{if(btDevice)btDevice.gatt.disconnect();}catch(e){}
    btDevice=null;btChar=null;btConnected=false;updBt();toast('已斷線');return;
  }
  try{
    toast('搜尋藍牙印表機...');
    btDevice=await navigator.bluetooth.requestDevice({acceptAllDevices:true,optionalServices:BT_SVCS});
    btDevice.addEventListener('gattserverdisconnected',()=>{btConnected=false;btChar=null;updBt();toast('印表機已斷線');});
    const srv=await btDevice.gatt.connect();let found=false;
    for(const su of BT_SVCS){try{const s=await srv.getPrimaryService(su);for(const cu of BT_CHARS){try{btChar=await s.getCharacteristic(cu);found=true;break;}catch(e){}}if(found)break;}catch(e){}}
    if(!found){try{const svcs=await srv.getPrimaryServices();for(const s of svcs){const cs=await s.getCharacteristics();for(const c of cs){if(c.properties.write||c.properties.writeWithoutResponse){btChar=c;found=true;break;}}if(found)break;}}catch(e){}}
    if(!found){toast('找不到列印通道');if(btDevice)btDevice.gatt.disconnect();btDevice=null;btChar=null;return;}
    btConnected=true;updBt();toast('✓ 連接：'+((btDevice&&btDevice.name)||'印表機'));
  }catch(e){if(e.name!=='NotFoundError')toast('連接失敗：'+e.message);btDevice=null;btChar=null;btConnected=false;updBt();}
}

/**
 * 將收據渲染到 Canvas 並返回點陣圖資料
 * @returns {ImageData}
 */
async function renderReceiptToCanvas(o){
  const c=S.config||{};
  const PAPER_W=384;       // 58mm 紙寬 = 384px at 203dpi; 80mm = 576px
  const FONT_SIZE=24;      // px，稍大確保清晰
  const FONT_SMALL=20;
  const FONT_HUGE=72;      // 流水號大字
  const PAD=10;

  const canvas=document.getElementById('receipt-canvas');
  const ctx=canvas.getContext('2d');

  // ─── 先預算高度 ───
  const lineH=FONT_SIZE+8;
  const lineHs=FONT_SMALL+6;
  let estimH=PAD;
  estimH+=lineH;           // 標題
  estimH+=FONT_HUGE+4;     // 大流水號
  estimH+=lineHs;          // 日期
  estimH+=lineH;           // ────────
  o.items.forEach(()=>estimH+=lineHs);
  estimH+=lineH;           // 分隔
  estimH+=lineH;           // Total
  if (o.paid){estimH+=lineHs;estimH+=lineHs;}
  if (o.note||o.phone) estimH+=lineHs;
  if (o.pickup) estimH+=lineHs;
  estimH+=lineH;           // 分隔
  estimH+=lineH;           // 感謝語
  estimH+=PAD+PAD;

  canvas.width=PAPER_W;
  canvas.height=estimH;

  // 白底
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,PAPER_W,estimH);
  ctx.fillStyle='#000';

  let y=PAD;
  const centerText=(text,fontSize,bold=false)=>{
    ctx.font=(bold?'bold ':'')+fontSize+'px "Noto Sans TC",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(text,PAPER_W/2,y+fontSize);
    y+=fontSize+8;
  };
  const leftRight=(left,right,fontSize)=>{
    ctx.font=fontSize+'px "Noto Sans TC",sans-serif';
    ctx.textAlign='left';
    ctx.fillText(left,PAD,y+fontSize);
    ctx.textAlign='right';
    ctx.fillText(right,PAPER_W-PAD,y+fontSize);
    y+=fontSize+6;
  };
  const divider=()=>{
    y+=4;
    ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(PAPER_W-PAD,y);ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.stroke();
    y+=8;
  };
  const dashedDiv=()=>{
    y+=4;
    ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(PAPER_W-PAD,y);ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.stroke();
    ctx.setLineDash([]);
    y+=8;
  };

  // ─── 渲染收據內容 ───
  // 標題
  centerText(c.receiptTitle||'Kaz! Car Receipt', FONT_SIZE, true);
  divider();

  // 大流水號
  ctx.font='bold '+FONT_HUGE+'px "Noto Sans TC",monospace';
  ctx.textAlign='center';
  ctx.fillText(o.no, PAPER_W/2, y+FONT_HUGE);
  y+=FONT_HUGE+8;

  // 日期時間
  const t=new Date(o.ts).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  centerText(o.date+' '+t, FONT_SMALL);
  dashedDiv();

  // 品項
  o.items.forEach(i=>{
    leftRight(i.name+' x'+i.qty, '$'+i.sub, FONT_SMALL);
  });
  divider();

  // Total
  ctx.font='bold '+FONT_SIZE+'px "Noto Sans TC",sans-serif';
  ctx.textAlign='left'; ctx.fillText('Total', PAD, y+FONT_SIZE);
  ctx.textAlign='right'; ctx.fillText('$'+o.total, PAPER_W-PAD, y+FONT_SIZE);
  y+=FONT_SIZE+8;

  // 付款/找零
  if (o.paid){
    leftRight('Paid', '$'+o.paid, FONT_SMALL);
    leftRight('Change', '$'+o.change, FONT_SMALL);
  }

  // 備註/手機/取餐
  const noteStr=(o.note?'備：'+o.note+' ':'')+( o.phone?'📱'+o.phone:'');
  if (noteStr){
    ctx.font=FONT_SMALL+'px "Noto Sans TC",sans-serif';ctx.textAlign='left';
    ctx.fillText(noteStr,PAD,y+FONT_SMALL);y+=FONT_SMALL+6;
  }
  if (o.pickup){
    ctx.font=FONT_SMALL+'px "Noto Sans TC",sans-serif';ctx.textAlign='left';
    ctx.fillText('取餐時間：'+o.pickup,PAD,y+FONT_SMALL);y+=FONT_SMALL+6;
  }
  divider();

  // 感謝語
  centerText(c.thanks||'謝謝您的光臨！', FONT_SIZE, false);
  y+=PAD;

  // 裁剪多餘高度
  const finalH=y+PAD;
  const finalCanvas=document.createElement('canvas');
  finalCanvas.width=PAPER_W;finalCanvas.height=finalH;
  const fctx=finalCanvas.getContext('2d');
  fctx.fillStyle='#fff';fctx.fillRect(0,0,PAPER_W,finalH);
  fctx.drawImage(canvas,0,0);

  return fctx.getImageData(0,0,PAPER_W,finalH);
}

/**
 * 將 ImageData 轉成 ESC/POS 點陣圖指令並送到印表機
 */
async function printBitmapESCPOS(imgData){
  const {width,height,data}=imgData;
  const buf=[];
  // Init + align center
  buf.push(0x1B,0x40,0x1B,0x61,0x01);
  // ESC * m nL nH — 點陣圖模式 (m=33: 24-dot double density)
  // 改用 GS v 0 — 光柵位圖（相容性更好）
  // GS v 0 m xL xH yL yH data...
  // m=0: normal, xBytes = ceil(width/8)
  const xBytes=Math.ceil(width/8);
  const xL=xBytes&0xFF, xH=(xBytes>>8)&0xFF;
  const yL=height&0xFF, yH=(height>>8)&0xFF;
  buf.push(0x1D,0x76,0x30,0x00,xL,xH,yL,yH);
  for(let row=0;row<height;row++){
    for(let byteIdx=0;byteIdx<xBytes;byteIdx++){
      let byte=0;
      for(let bit=0;bit<8;bit++){
        const col=byteIdx*8+bit;
        if(col<width){
          const idx=(row*width+col)*4;
          const r=data[idx],g=data[idx+1],b=data[idx+2];
          const luma=(r*299+g*587+b*114)/1000;
          if(luma<128) byte|=(0x80>>bit); // 深色=黑點
        }
      }
      buf.push(byte);
    }
  }
  // Feed + cut
  buf.push(0x0A,0x0A,0x0A,0x1D,0x56,0x01);

  // 傳送（分塊，每塊最大 512 bytes）
  const arr=new Uint8Array(buf);
  const CHUNK=512;
  const wt=btChar.properties.writeWithoutResponse?'writeValueWithoutResponse':'writeValueWithResponse';
  for(let i=0;i<arr.length;i+=CHUNK){
    try{
      await btChar[wt](arr.slice(i,i+CHUNK));
      await new Promise(r=>setTimeout(r,30));
    }catch(e){return false;}
  }
  return true;
}

      localStorage.removeItem('kazpos_session');

})();
